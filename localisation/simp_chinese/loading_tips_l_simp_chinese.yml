l_simp_chinese:
LOADING_TIP_0: "如果世界正在走向崩溃，便让天平在某天重置。\n—赛利姆三世"
LOADING_TIP_1: "为祖国而死，那是最美的命运啊！\n—大仲马"
LOADING_TIP_2: "团结的人民永远不会被击溃！\n—豪尔赫 盖坦 1946"
LOADING_TIP_3: "我们在里面奔驰的黑暗过分浓厚，使我们无法对这片黑暗说任何话；我们甚至不能说,这片黑暗注定要一直持续下去。\n—克洛德 列维- 斯特劳斯 1950"
LOADING_TIP_4: "上帝 祖国 家庭\n—普利尼奥 萨尔加多的宣传语录 1937"
LOADING_TIP_5: "与资产阶级不同，无产者是相信神话的，那就是社会革命，人是形而上学的动物，常常被精神力量和伦理原则所感动而采取行动。没有神话，人的存在就没有意义。\n—何塞 卡洛斯 马里亚特吉 1928"
LOADING_TIP_6: "白色的蜜蜂，你在我灵魂中嗡嗡响着，因蜜陶醉，你飞旋在烟雾缓慢的螺旋里。我是绝望者，没有回声的言语，一个一无所有，也拥有过一切的人。\n—巴勃罗 聂鲁达 1936"
LOADING_TIP_7: "不是很多，但它们存在着……它们劈开黑色的沟壑，在那最凶恶的面孔中和那最像牛的背脊里。也许它们是那异教徒阿蒂拉的马匹，或者是死神派到我们这里来的黑色骑手。\n—赛缪尔 巴列霍 1929"
LOADING_TIP_8: "我们必须有信心。只要为了公共利益，就没有徒劳的努力。\n—热图里奥 瓦加斯 1930"
LOADING_TIP_9: "君主政体要想对得起自己的历史地位，就必须把为广大人民提供社会福利作为首要任务。\n—奥地利首相马克斯 弗拉迪米尔 冯 贝克男爵 1908 奥地利议会演说"
LOADING_TIP_10: "绝对君主制不需要任何有关于现代性的辩论与政治学上的辩论，君主的全能统治就是自然秩序，君主国的臣民不会也不需用人类的政治理性论述君主为何存在，仅将君主当作风、雷、雨、电一样的自然存在来接受。"
LOADING_TIP_11: "每个人的心里都有一个恶棍。你可能看不到他，但他随时会跳出来攻击你。这样的人不适合作为君主的顾问。因为对于君主来说，猜疑就是毁灭。\n—奥托 冯 俾斯麦"
LOADING_TIP_12: "只要工人健康，就给他工作；只要工人生病，就给他护理；只要工人年老，就给他赡养。在普通法颁布之时，难道不是公开宣布了工作权吗？在我们所有的社会安排中，不是都规定了一个人在他的同胞面前说：“我很健康，我想工作，但找不到工作”时他也有权说：“给我工作”，而且国家有义务给他工作吗？\n—奥托 冯 俾斯麦 1884"
#LOADING_TIP_0: ""


 
