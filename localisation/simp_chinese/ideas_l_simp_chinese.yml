l_simp_chinese:
 economy: "经济法案"
 civilian_economy: "民用经济" 
 civilian_economy_desc: "“只有市场经济才能实现繁荣和自由”- 米尔顿·弗里德曼"
 low_economic_mobilisation: "前期动员"
 low_economic_mobilisation_desc: "“我们赖以生存的经济社会之所以会存在突出的问题，一方面是由于不能提供充分就业，另一方面则是因为武断而又不公平的财富和收入的分配”- 约翰·梅纳德·凯恩斯"
 partial_economic_mobilisation: "部分动员"
 partial_economic_mobilisation_desc: "“你们马上就要踏上征程去进行一场伟大的圣战，为此我们已精心准备了数月……我对你们的勇敢、责任心和作战技巧充满了信心，我们迎接的只会是彻底的胜利”- 德怀特·艾森豪威尔"
 war_economy: "战争动员"
 war_economy_desc: "“你们不会全都牺牲。每次战斗下来，你们当中可能会牺牲百分之二。不要怕，每个人终究会死……真正的英雄，是即使胆怯仍旧坚持作战的男子汉”- 乔治·巴顿"
 tot_economic_mobilisation: "总动员"
 tot_economic_mobilisation_desc: "“一个哪怕只有最微小的好战倾向的个人，也会发现自己难以拒绝国家为自己提供的枪械，因为在他的头脑中另一种出路的可能性已不复存在。”-恩斯特·荣格尔《总动员》"
 mobilization_laws: "征兵法案"
 disarmed_nation: "去军事化国家"
 Training_the_military_is_prohibited: "§R禁止训练军队§!"
 disarmed_nation_desc: "“无论人与人还是国与国之间，尊重他人权利才能带来和平”- 贝尼托.华雷斯"
 volunteer_only: "志愿兵役"
 volunteer_only_desc: "“没有军队的外交，好比是没有乐器的音乐”- 腓特烈二世"
 limited_conscription: "有限征兵"
 limited_conscription_desc: "“狮子率领的羊群战斗力远胜于绵羊率领的狮群”- 亚历山大大帝"
 extensive_conscription: "广泛征兵"
 extensive_conscription_desc: "兵民是胜利之本-毛泽东"
 service_by_requirement: "按需求征兵"
 service_by_requirement_desc: "“征兵是一个国家的生命力，是其道德的净化，也是其所有习惯的真正基础”- 拿破仑.波拿巴"
 all_adults_serve: "所有成人服兵役"
 all_adults_serve_desc: "“一个拥有不受控制的军事征兵权的自由政府，是最荒谬和可憎的矛盾和胡言乱语”- 佚名"
 scraping_the_barrel: "穷途末路"
 scraping_the_barrel_desc: "“我认为征兵原则是对我们所有珍视的个人自由、民主自由和基督教教义理想的彻底否定”- 罗杰.纳什.鲍德温"
 trade_laws: "贸易法案"
 free_trade: "自由贸易"
 free_trade_desc: "“如果外国能以比我们自己制造还便宜的商品供应我们，我们最好就用我们有利地使用自己的产业生产出来的物品的一部分向他们购买”- 亚当·斯密"
 export_focus: "重视出口"
 export_focus_desc: "“增加我们财富和金银的普遍方法是对外贸易，因此我们必须遵循一项规则：每年卖给外国人的商品价值，必须超过我们消费他们的商品价值”- 托马斯·孟"
 limited_exports: "有限出口"
 limited_exports_desc: "“一个国家的真正利益不在于追求贸易顺差，而在于通过平衡的贸易实现产业的相互繁荣”- 大卫·休谟"
 closed_economy: "封闭经济"
 closed_economy_desc: "“国家最重要的制造业，应当通过关税手段加以保护，即使短期内成本更高……直到它能独立应对外国竞争”- 亚历山大·汉密尔顿"
