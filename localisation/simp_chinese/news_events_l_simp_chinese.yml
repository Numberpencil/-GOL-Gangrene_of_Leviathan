news.1000.t: "匈牙利国王卡洛伊四世遇刺身亡"
news.1000.d: "在布达佩斯一场旨在展示王国团结与稳定的公开演讲，最终以悲剧和混乱收场。匈牙利国王卡洛伊四世在多瑙河畔的议会广场向民众发表讲话时，遭到一名瓦拉几亚极端民族主义者的枪击，经抢救无效后宣告不治。\n  据现场目击者称，凶手混入人群，在国王演讲至高潮时突然发难，高呼“为了瓦拉几亚”后连开数枪。国王身中数弹，当场倒地，安保人员随后将凶手击毙。此次事件在布达佩斯弓|发了巨大震惊和悲痛，随后而来的则是针对瓦拉几亚裔居民的愤怒与骚乱。\n  有分析家认为这可能会导致新的战火，而这场战火无疑将决定巴尔干的未来"
news.1000.a: "真野蛮"
news.1001.t: "匈牙利王国新王奥托加冕圣斯蒂芬王冠"
news.1001.d: "在举国哀悼与复仇的呼声中，已故卡尔四世之子、年轻的奥托·冯·哈布斯堡于圣马蒂亚斯教堂正式加冕为匈牙利国王，尊号奥托一世。加冕仪式庄严肃穆，那顶象征着匈牙利王权的圣斯蒂芬王冠被戴在了新王头上，标志着哈布斯堡王朝在一个充满不确定性的时代开启了新的篇章。 \n在随后发表的全国讲话中，奥托一世面色凝重，语气坚定，彻底摒弃了其父试图推行的调和政策。他郑重宣告：“以圣斯蒂芬之名，以我流消的血液，我发誓，我所继承的王冠之耻辱，必将以血洗清。瓦拉几亚将为其庇护的恐怖与背叛，付出相应的、彻底的代价。”这一强硬表态引发了匈牙利议会广场上山呼海啸般的支持声浪。"
news.1001.a: "来真的？"
news.1002.t: "布达佩斯通牒"
news.1002.d: "在匈牙利最后通牒式的压力下，瓦拉几亚自治政府今日宣布全面接受布达佩斯提出的所有条件，以示“彻底臣服”。\n匈牙利国王奥托一世政府获得了对瓦拉几亚国防、财政及内部安全的全面干涉。布加勤斯特的现任政府在一片屈辱中被迫同意了这一安排，以换取匈牙利的“宽恕”。\n此间观察家认为，这种彻底的屈服无异于政治自杀，极大地动摇了现政府的合法性，恐将为更极端的民族主义势力铺平道路。"
news.1002.a: "无药可救，难道他们忘了1914吗？"
news.1003.t: "巴尔干爆发战争"
news.1003.d: "今日午时，匈牙利王国政府正式向瓦拉几亚铁卫团政权递交宣战书，指控其“背信弃义、煽动恐怖主义并破坏地区稳定”。奥托一世国王在议会宣布：“瓦拉几亚的叛乱政权必须被彻底铲除，圣斯蒂芬王冠的尊严不容挑衅！”\n匈牙利陆军多个师已越过特兰西瓦尼亚山区，向布加勒斯特方向推进。此次军事行动被布达佩斯称为“惩戒行动”。\n面对匈牙利攻势，塞尔维亚与保加利亚和瓦拉几亚宣布展行此前在贝尔格莱德签署《巴尔干共同防御条约》，宣布“以一切必要手段支援瓦拉几亚”，并对匈牙利宣战。三国联军计划从南部战线夹击匈牙利军队，试图解围布加勒斯特。"
news.1003.a: "我早就说这群混蛋会再次搞砸这一切"
news.1004.t: "拉加代尔赢得法国大选"
news.1004.d: "巴黎，今日凌晨——休伯特·拉加代尔领导下的法兰西工团行动党（FAAT）在昨日结束的国民议会选举中获得压倒性胜利，一举终结了第三共和国长期以来的政治格局。\n初步计票结果显示，FAAT凭借“劳动、家庭、祖国”的鲜明主张，不仅在传统工业区巩固了阵地，更在中部乡村与南部城镇赢得了前所未有的广泛支持，从而斩获绝对多数议席。社会党与激进共和党等传统力量遭遇溃败。\n选举结果揭晓后，拉加代尔在巴黎总部阳台向欢呼的支持者宣告：“劳动者的法兰西，现在站起来了。”分析认为，这场胜利标志着国家工团主义作为一种强大的新政治力量正式登上欧洲舞台，法兰西的未来航向即将迎来根本性转变。"
news.1004.a: "天哪，又一个革命分子？"