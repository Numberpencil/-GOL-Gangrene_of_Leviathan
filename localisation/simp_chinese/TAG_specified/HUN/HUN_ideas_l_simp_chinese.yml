l_simp_chinese:
A_turbulent_country: "纷扰的多民族之国"
A_turbulent_country_desc: "自帝国崩溃之后，匈牙利内部的反马扎尔浪潮正不断变高，日耳曼，斯拉夫，瓦拉几人都正试图蚕食与分解王国。"
Aftermath_of_Great_Depression: "大恐慌的余波"
Aftermath_of_Great_Depression_desc: "匈牙利的经济到了三十年代却仍然以农业为主，但就算农业经济也遭到了第二次大恐慌的冲击，其竞争力大不如前，如今的我们正陷入被俄罗斯，阿根廷等国取代的窘境，如若再不改变一切便晚了。"
Legacy_of_the_Habsburgs: "哈布斯堡的遗产"
Legacy_of_the_Habsburgs_desc: "哈布斯堡国王目前仍然作为维系大匈牙利的重要纽带，只要他仍然存在那么王国便不会陷入毁灭，而哈布斯堡家族从内莱塔尼亚带来的资产也提振了匈牙利的实力。"
Post_Danube_era_army: "后多瑙时代的军队"
Post_Danube_era_army_desc: "在多瑙战争中，匈牙利王国军队为维持领土完整以及打击疯狂的巴尔干民族主义者做出了巨大贡献，军队的意志力有目共睹，但现在这支经历战争磨砺的军队正逐渐腐化，且急需一场全面的现代化改革。"