l_simp_chinese:
HUN.1.t: "§W卡尔遇刺§！"
HUN.1.d: "哎你怎么似了"
HUN.1.a: "快，保护陛下！"
HUN.2.t: "权力真空"
HUN.2.d: "你说的对，但匈牙利王国是由，，，"
HUN.2.a: "我们的匈牙利，究竟会，变成什么样子（哽咽）"
HUN.3.t: "奥托加冕"
HUN.3.d: "帅OTTO帅"
HUN.3.a: "奥托国王万岁，匈牙利万岁！"
HUN.4.t: "傀儡瓦拉几亚"
HUN.4.d: "超级拼装！"
HUN.4.a: "让东方的朋友们，作出回答！"
HUN.5.t: "瓦拉几亚脱离控制"
HUN.5.d: "科团长，你人呢，你根本不在布加勒斯特！"
HUN.5.a: "该死！"
HUN.6.t: "对瓦拉几亚的最后通牒"
HUN.6.d: "最后通牒是最后和通牒还是最后的通牒？"
HUN.6.a: "我们不会善罢甘休"
HUN.7.t: "瓦拉几亚拒绝要求"
HUN.7.d: "我也干了"
HUN.7.a: "那就没什么好说的了"
HUN.8.t: "瓦拉几亚同意要求"
HUN.8.d: "我其实没干"
HUN.8.a: "算他们识相"