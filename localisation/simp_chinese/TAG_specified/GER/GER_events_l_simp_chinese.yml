GER.1.t: "新年演讲"
GER.1.d: "褐色大厅的无线电的电波，穿过静谧的港湾，掠过灯火通明的办公室。曾经左翼的谩骂在这一刻被肃清，党的声音占据了一切——戈培尔博士，他是党的意志的喉舌，也是民族社会主义的第一演说者，他出生于杜塞尔多夫附近下莱茵河畔的小工业城镇：赖特，他是工匠的儿子。在攻读日耳曼语言博士与文学博士之后，他在1923年加入了声名大噪的民社党，他曾沉溺于社民党所制造的泡沫，然而在目睹萧条与无能后，他对这个政党丧失了信心，他曾加入过左翼青年联盟，但对祖国和民族的热爱令他格格不入。\n他的声音经过无线电，在党员与劳动者的耳畔回响，即便足部残疾也未能折损他那挺拔如标枪般的姿态，那灼热的目光中燃烧着对党和人民的赤诚。\n“亲爱的德意志同胞们，原谅我在这欢庆的岁末美酒中掺入一丝苦涩，我相信，今日德国之各阶层、各群体，皆有理由满怀信心地举杯。我们回顾往昔、展望未来的这份欢欣，亦因这种肃穆与刚毅的英雄气概而显得愈发深沉。”\n戈培尔的每一句话都显得铿锵有力，激昂的表达与起伏的语调中充斥着力量，他是苦出身，也是民社党与群众的博士。\n“让我们并肩步入新年。皇帝与宰相感激每一位同胞。我们因身居高位服务人民而自豪。我们皆是人民的一分子，承载着她的精神与意志。我们最卑微的公民，也比他国的君王更令我们珍视。”\n“十二个月前，各个党派在帝国议会中胡作非为，社民党内阁的软弱统治未能给予军人们应有的体面、犹太金融资本盘踞在德国母亲的身躯中蚕食养分、反对派在人民头上独断专横。现在，无能的内阁已然倒塌，党的贤人与保守党的能人一同治理全德。”\n“无人有权倦怠。每个人，各司其职。我们深知德国仍有匮乏，但绝不向其低头。我们不愿做鸵鸟，而是要昂首面对命运。无人应丧失勇气。唯有自弃者，方真沦亡。”\n“在这岁末时刻，让我们谦卑地感谢那赐予我们忠诚与勤勉之礼的伟大众神。我们祈求来年的赐福，并誓言绝不辜负这份神恩。”\n在最后，这场颂词迎来了最高潮，戈培尔博士用他那日以贯之的语调与激情——他的声音颤抖，那是一种足以点燃冰雪的灼热：——为德国民众献上了最后的祝福：\n“我们向威廉二世皇帝致以崇高敬意。愿命运保佑他长寿。我们为宰相献上祝福，他无畏地举旗穿过风暴。愿他康健，愿他完成伟业。”\n“只要我们有勇气去战胜曾经击倒德国的苦难，我们就绝不会失败。”"
GER.1.a: "“愿胜利到来”"