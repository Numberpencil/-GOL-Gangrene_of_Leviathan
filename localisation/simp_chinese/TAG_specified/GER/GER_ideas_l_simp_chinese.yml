l_simp_chinese:
 toward_collapse: "走向崩溃"
 toward_collapse_desc: "帝国的繁荣在战后达到巅峰，民主化浪潮空前高涨，大家都开始期待着日后逐渐轻松的生活。可是，军人地位的下降后的反弹、社会经济危机和政党政治的腐败让帝国内部逐渐压抑，到处蔓延着刺杀和恐怖。在危机感、不安感和政党无能的情况下，民众可能将再次靠拢军队，而失败的民主又该何去何从？"
 rotten_and_obscurantist_system: "腐朽晦暗的体制"
 rotten_and_obscurantist_system_desc: "帝国自从兴登堡内阁中期便陷入了政治斗争和腐败贪污之中。臃肿的官僚系统、低效的执行力以及一系列政治丑闻和恐慌让民众开始质疑现任政府，舆论对政府御用报纸率先掌握的爆点充满嫉妒下，也展开了对政府的疯狂攻击，就这样人民永远被夹杂在了漩涡的中央，而无尽的黯日何时又能结束。"
 Weltpolitik: "世界政策"
 Weltpolitik_desc: "随着大战的胜利，我们的战利品已让将世界颤抖，现在将摧毁过时老朽的旧秩序，而泛欧同志会就是帝国在战后为了孤立英法俄而采取的国际经济体系，这使欧洲诸多国家与德国深度绑定在一起，成为帝国繁荣和贸易发展的重要基石。不过，在保守派的强烈要求下，该经济同盟逐渐走向内部自给自足，国际自由贸易逐渐被帝国忽视，也许这是不安感的前奏吧……让帝国于世界永恒不朽！"
 Mitteleuropa_trade_agreement: "中欧贸易协定"
 Mitteleuropa_trade_agreement_desc: "帝国开辟的阳光下的地盘与东部广袤的土地将成为德意志的食粮，为了更好地促进附属国与帝国中央之间的联络与经济支撑，签署了中欧贸易经济协定以增强成员国的经济结构。贸易协定让德国企业与重工业顺利地打入成员国体系，而代价是将德国的资本大量投资于生存空间的基础设施建设。"
 The_aftermath_of_the_economic_crisis: "经济危机的余波"
 The_aftermath_of_the_economic_crisis_desc: "三十年代。我们的经济饱受疮痍，尽管后续接任的政府及时改革，终究是亡羊补牢，我们的民众还生活在经济危机的余波与干涉的影响下，工人与农民正在大街小巷内控诉不公，商人与学生们呼吁大德意志的改革，我们必须要采取措施来脱离危机的影响......"
 Heil_dir_im_Siegerkranz: "万岁，胜利者的桂冠！"
 Heil_dir_im_Siegerkranz_desc: "我们拼上了国运，我们付出了生命，德意志的英雄儿女为了富强与野望，付出他们的一切......最终，我们终于在巴黎插上了黑白红的旗帜，我们终于戴上了胜利者的桂冠！是时候享受我们赢来的一切了。"
 Capital_outflow: "资本东流"
 Capital_outflow_desc: "我们在新的土地上获得了大量的工业原料，这本是一件好事对吧？但谁也没想到这对我国的化工产业产生了如此大的打击，但好在他们去东方寻找新的领域了，例如高利贷......毕竟这就是市场。不管怎么说，至少没有引发更进一步的经济恶化。"
 Imperial_army: "帝国陆军"
 Imperial_army_desc: "我们赢得了世界大战——终结一切战争的战争，陆军在其中发挥了不可磨灭的作用。如今，虽然我们的军队传统还在，但十几年过去，帝国陆军已经滋生了许多弊端。"
 Imperial_navy: "帝国海军"
 Imperial_navy_desc: "世界大战后，为了巩固我们的霸权地位，我们打造了一支强大的海军。不过，要维持它并不容易，况且它还能经受当代的新挑战吗？"
 Imperial_air_force: "帝国空军"
 Imperial_air_force_desc: "在上一次世界大战中，空军的力量逐渐凸显，唯有打造一支强大的空中力量，我们才能捍卫祖国的领空乃至发动进一步的攻击。战后，空军该向什么方向发展呢？旧有的经验在新的局势下还有用吗？"
