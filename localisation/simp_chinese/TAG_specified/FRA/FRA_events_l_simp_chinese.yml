l_simp_chinese:
FRA.1.t: "德斯佩雷之死"
FRA.1.d: "疼痛变得很遥远了。像隔着一层厚厚的雾，听见堑壞另一头的炮声。这感觉奇异——肺里火烧火燎的灼痛，竞然让我想起了1916年凡尔登那个结冰的早晨。空气也是这么冷，这么稠，带着硝烟和血锈的颗粒，吸进去，像有刀子在刮。区别是，那时我还能感到烂泥没过靴简的冰凉，现在，只剩下一片无边无际的、沉重的麻木，从脚底漫上来。\n我眼前是书房华丽的天花板雕花，可看到的，却是别的东西。是那些年轻的面孔，一张张，沾满了泥污和恐惧，在摇曳的煤油灯下看着我。我带着他们冲锋，带着他们死在铁丝网前，带着他们守住了一寸又一寸毫无意义的烂泥地。我们以为守住了法国。可我们守住了什么呢？战争结束时，没有胜利，只有一片更庞大、更沉默的废墟。不是城市的废墟，是精神的废墟。人们眼里的光熄灭了，取而代之的是一种空洞的、燃烧殆尽的灰暗。比战败更可怕的，是信仰的破产。他们不再相信“共和国”，不再相信“光荣”，甚至不再相信“未来”。巴黎的街道上飘着的，是比德国人炮火更令人窒息的虚无。\n当混乱和尖叫开始撕裂街道时，我带来了纪律，带来了沉默。是的，沉默。我让报纸的版面变得苍白，让咖啡馆的交谈降到耳语，让深夜的敲门声成为最有效的镇静剂。人们说这是恐惧。也许是。但混乱是更大的恐惧。我用钢铁的框架，把这片破碎的国土重新箍起来，不管它是否疼痛，是否流血。工厂的烟囱重新冒烟了，列车准点了，街头没有倒毙的饿殍了。代价是，阳光下的阴影变得很长，我把一个国家从悬崖边拉回来，却可能只是把它交给了另一股激流。\n累了。\n真的累了。身体像一间老旧的、四面漏风的营房，所有的哨兵都已撤岗。远处似乎有声音，是窗外巴黎的声音吗？还是记忆里，索姆河攻势前，那令人窒息的、万籁俱寂的黎明？分不清了。\n也好。\n就让我在这遗忘的黎明前下岗吧。法国的明天，无论是拉加代尔的工团之国，还是布鲁姆他们的民主理想，抑或是别的、我无法想象无法掌控的风..\n都交给能承受它重量的人吧。\n最后一丝光，从眼皮的缝隙里溜走了。没有炮火，没有喧嚣，只有一片深沉如海、万古如斯的宁静，温柔地覆盖上来。"
FRA.1.a: "俱往矣"
FRA.2.t: "狂欢"
FRA.2.d: "德斯佩雷的死讯被公布后全法国陷入狂欢，他们庆祝个独裁者的死去以及对法国的未来充满憧憬。\n而当委员会开始组织法国的全国大选之后，各派势力都尽一切可能中法国人民的手中攫取更多的支持扩张自己的实力。因而法国陷入了一场全新的社会动荡中，而可以笃定的是在大选结束之前这种乱象不会结束。"
FRA.2.a: "有意思"
FRA.3.t: "工团主义的力行者-工团行动党"
FRA.3.d: "拉加代尔是法国工团主义运动中的异类。当大多数工团主义者相信“总罢工”和“工人自治”时，他早已走向了另一条路——民族主义。不是保守派的民族主义，而是一种从工团主义士壤里长出来的、把“阶级”换成“民族”的变种。\n他的理论源头是索雷尔。索雷尔说“无产阶级暴力是神话”，拉加代尔把它改成了“法兰西的复兴是神话”。索雷尔晚年向右转，拉加代尔跟得更远。1920年代，他创办《工团主义革命》杂志吸引了一批对国际主义失望、对共产国际厌恶、对“输出革命”不感兴趣的工团干部。他们的口号是：“先救法国，再谈革命。\n德斯佩雷的军方独裁时期，拉加代尔没有像其他左翼一样被关进监狱。不是因为他是叛徒，而是因为他找到了共同语言一秩序。他对将军们说：“你们要秩序，我要法兰西。我们不是敌人。”军方给了他有限的活动空间，他在这个空间里编织自己的网络：不满的退伍军人、失业的技术工人、被工团正统派排挤的边缘干部\n1935年，当拉加代尔以“民族工团主义”的旗号登上舞台时，很多人以为他不过是又一个法西斯模仿者。但他们错了。拉加代尔不是模仿者，他是把法西斯的组织效率，工团主义的群众动员、民族主义的复仇情绪揽在一起，搅拌出一套法国本土配方。他与军方合作，保留工会的形式，但清空了内容——工会不再是阶级对抗的场所，而是国家动员的传送带。\n他的对手们低估了他。布鲁姆觉得他是个“理论上的怪胎”，加香觉得他是个“法西斯变种”，正统工团主义者觉得他是个“叛徒”。拉加代尔不在乎。他只需要一群足够忠诚的干部、一支足够听话的民兵、一个足够混乱的时局。"
FRA.3.a: "已了解"
