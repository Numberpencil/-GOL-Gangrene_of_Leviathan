FRA.7.t: "务实主义的选择-法兰西共产党"
FRA.7.d: "1920年图尔大会，多数派投票加入共产国际，法国共产党由此诞生。马塞尔·加香是这场分裂的核心人物，从那时起，他便将法共牢牢绑定在伊斯坦布尔的路线上。\n1935年，德斯佩雷的独裁政权摇摇欲坠。加香坐在《人道报》的编辑部里，读着布鲁姆的来信——社会党领袖邀请他加入人民阵线。\n加香没有回复。他等的是伊斯坦布尔的电报。三天后，电报到了，内容很短：“可以合作，但不结盟。”加香读了三遍，明白了：共产国际不想把赌注全压在布鲁姆身上，但也不愿意完全放弃这次机会。于是法共的立场定了下来——不加入人民阵线，但不拆台。罢工照常组织，街头照常活动，只是不在任何联合声明上签字。\n加香在党内会议上说：“我们不是布鲁姆的附属品。等他们赢不了的时候，工人会知道谁才是真正的革命者。”法共的选择很务实：等。等德斯佩雷死，等人民阵线搞大选，等拉加代尔上台一无论谁赢，法共都要站在能讨价还价的位置上。加香太清楚了，伊斯坦布尔不在乎法国是共和国还是工团国还是法西斯国，伊斯坦布尔只在乎法国共产党是不是还有用。"
FRA.7.a: "返回"
FRA.8.t: "脆弱的联盟-人民阵线"
FRA.8.d: "1935年初德斯佩雷的独裁政权已经摇摇欲坠。老元帅病入膏肓，巴黎的传闻一天比一天多——“他要死了”“军方在找接班人”“共和派准备动手了”。\n莱昂·布鲁姆等了多年。多年前，他眼睁睁看着共和国的议会制度被军靴踩碎。他没有反抗——不是不想，是没法。社会党的工会早被工团主义者抢走了，街头不属于他。他唯一能做的是等。\n现在机会来了。为了扩大人民阵线布鲁姆找上了激进党。这帮人当年是第三共和国的柱子，现在柱子倒了，他们比谁都着急。爱德华·达拉第坐在布鲁姆对面，第一句话就是：“你确定军方会让步？”布鲁姆回答：“他们快内战了。\n人民阵线就进一步扩大了。不是选举胜利的那个人民阵线，而是一个更仓促、更脆弱的版本：社会党加激进党，再加几个零星的小团体。共产党没有加入，加香说“等你们先赢再说”，但私下达成了默契罢工配合，街头不拆台。"
FRA.8.a: "返回"
FRA.9.t: "奇美拉-人民党"
FRA.9.d: "他本是共产党的明日之星。二十年代，他是最年轻的市长，是反殖民战争的英雄，是工人运动里最能演讲的那张嘴。共产国际甚至考虑过让他进主席团。然后他去了共产国际，看清了真相，回来就决裂了。他不相信共产国际了。\n1932年，他创办法兰西人民党。名字像左翼，衣服像右翼，骨子里是权力。他的理论是缝合怪：工人的反资本右翼的反犹民族主义的复仇领袖崇拜的组织形式。多里奥不在乎逻辑自洽，他只在乎能不能用。能用就行。他的支持者不是工人，不是农民，是那些被时代甩下来的人-一破产的小店主、退伍的老兵、读了大学找不到工作的年轻人。他们不知道自己要什么，但知道自己不要什么：不要工团，不要共产党，不要犹太人，不要现在这个烂透了的法国。"
FRA.9.a: "返回"
FRA.10.t: "民主主义的末路-共和联盟"
FRA.10.d: "共和联盟是第三共和国最古老的右翼政党，根植于地方名流、天主教温和派和工业资本。他们不信街垒，不信枪杆子，只信一件事：选票。只要议会还在，只要投票箱还能打开，他们就有机会。\n路易·马兰是这种信念的最后化身。这个永远穿深色西装的男人，在1936年看起来像上个世纪的人。他不搞准军事组织，不喊极端口号，甚至很少激动。他的武器是议会程序、预算修正案和不信任动议。\n但武器已经生锈了。\n德斯佩雷的军靴踩碎了议会，拉加代尔的工团党又用“直接行动”填上了权力真空。共和联盟被夹在中间——左翼嫌他们太右，右翼嫌他们太软。马兰的共和党人发现自己成了最尴尬的存在：他们曾是共和国的柱子，现在共和国没了，柱子还站着，却不知道在支撑什么。\n马兰没有流亡，没有抵抗，也没有投降。他只是在马赛的办公室里，一遍遍翻看过去的选举记录，计算着“如果恢复普选，我们还能拿多少席”。他的助手提醒他：现在街上说了算的不是选票，是红黑旗。马兰抬起头，说了一句让所有人沉默的话：“那就等。等他们把一切搞砸的时候，人民会想起还有我们。”"
FRA.10.a: "返回"
FRA.11.t: "坚定的独裁拥护者-青年爱国者"
FRA.11.d: "30年代初泰坦热从保守派的青年组织里拉出了一批人。成立了“青年爱国者”。他们的口号是：“秩序、责任、法兰西。”\n泰坦热是个商人，香槟酒商。他办组织的方式像办企业—有目标、有考核、有制服。青年爱国者的成员穿蓝色衬衫，戴贝雷帽，胸前别着法兰西地图形状的徽章。他们不喜欢议会，不喜欢工会，不喜欢一切“拖累国家效率”的东西。他们的理想是一个“强政府、小议会、大军队”的法兰西。\n德斯佩雷上台时，泰坦热是最早表示支持的文职领袖之一，军方给了他活动空间，他帮军方搞青年训练营、街头巡逻和反颠覆情报。作为回报，青年爱国者成了军政府时期少数被允许公开活动的非军方组织。\n但泰坦热不满足于当军方的配角。他在等一——等德斯佩雷死，等军方内订，等一个“文职强人”出现的时机。拉加代尔的崛起，是他看到了机会。青年爱国者的制服和工团党的红黑旗走在一起，乍看有点不搭，但泰坦热不在乎颜色，他只在乎权力。"
FRA.11.a: "返回"
FRA.12.t: "投机主义-农民联盟"
FRA.12.d: "1934年，他在布列塔尼的田野里拉起“绿衫军一不是红旗，不是三色旗，是绿色的，土地的颜色。农民联盟不是政党，多热尔嫌政党太脏。他的组织是“运动”，是穿绿衫的农民在乡镇集市上的呐喊：“城市管好你们自己，土地是我们的。\n大萧条让农产品价格跌了一半，巴黎的政客们还在吵架。多热尔的方案简单粗暴：食，一分不能少。政府按成本价收粮，左翼说他是反动派，右翼说他是经济文盲德斯佩雷的军政府需要粮食，多热尔需要价格保护，双方做了几年生意。而现在，他正逐渐朝着拉加代尔靠拢"
FRA.12.a: "返回"
FRA.13.t: "随之任之-工人国际支部"
FRA.13.d: "1905年，让·饶勒斯把法国的社会主义者捏在了一起，取名“工人国际法国支部”。那时候它是欧洲最强的社会主义政党，是第二国际的明珠，是所有向往“和平过渡”的工人的家。饶勒斯被刺杀了，但他的党活了下来。1936年，这个党还活着，但已经不像活着了。\n工团主义者用总罢工和街垒抢走了工人阶级的忠诚。布鲁姆带着一批骨干出去搞人民阵线。共产党在左翼虎视眈眈，等着收编所有不满的人。保罗·富尔接手的是一个空壳——议会里有席位，但议会已经被军政府解散过；工会里有关系，但工会已经被工团党接管了：党员还在交党费，但很多人已经在打听工团党的入会流程。\n富尔不是饶勒斯，也不是布鲁姆。他是个忠实的党务官僚，擅长写决议、主持会议、在派系之间走钢丝。但钢丝下面已经没有观众了。"
FRA.13.a: "返回"
FRA.14.t: "工团胜利"
FRA.14.d: "在经过长达数月伴随着混乱的鏖战之后，各方为了争取自己在民主大选中获得更多的席位而出了浑身解数，而在将宣告谁是胜者的今天所有人都屏息敛声等待着结果。\n当选举委员会的最终公告在深夜的电波中传出工团行动党成为议会多数党时，巴黎街头爆发出的不是通常的欢呼，而是一种沉重、整齐、宛如战歌的合唱。支持者高唱《国际歌》的旋律，歌词却已悄然替换为“法兰西的工人，锻造你的国家！\n休伯特·拉加代尔——这位曾经的工会组织者、索雷尔主义的忠实信徒，在无数火炬的照耀下，登上了巴黎市政厅的台阶。他的演讲没有过多的华丽辞藻，只有钢铁般的铿锵：“从今天起，法兰西将是一个伟大的工团，每一个劳动者都是它的股东，每一座工厂都是它的堡垒。我们将是一个属于法兰西劳动者的民族共同体！”\n这并非一场普通的政权更替。拉加代尔的胜利，标志着一种独特而危险的思想获得了国家的引擎：索雷尔国家工团主义。它激烈地唾弃腐朽的资本主义议会制，也同样猛烈地反对布鲁姆所代表的、强调国际联合的传统社会主义。它的核心是“民族”与“工团”的融合一一法兰西将被重组为一个以行业工团为基本单位的、高度纪律化的有机整体，对外捍卫民族独立与经济自主，对内推行“阶级合作”与生产至上。\n布鲁姆的社会党及其盟友在震惊中陷入了分裂。一部分人斥责这是“穿着工装的法西斯主义”；而另一部分基层工人，却被其展现出的力量与民族认同感所吸引。旧的军方与文官体系则保持沉默的警惕，他们看到了一种新的、更有群众基础的秩序取代了德斯佩雷冰冷的军事架构。\n街头，褐衫的“工团行动队”与“共和保安队”并肩维持着秩序，一种混合了革命激情与民族主义庄严的奇异新秩序，正在法兰西的土地上生根。"
FRA.14.a: "工团，前进"







