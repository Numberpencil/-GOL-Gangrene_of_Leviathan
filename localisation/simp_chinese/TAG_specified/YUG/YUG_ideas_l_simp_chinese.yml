l_simp_chinese:
Belated_Victory: "迟来的胜利"
Belated_Victory_desc: "大战过后我们的祖国便被邪恶的哈布斯堡肢解，科索沃，马其顿皆离我们而去，就连首都贝尔格莱德也陷入了哈布斯堡的暴政之中。但随着哈布斯堡帝国崩溃，我们塞尔维亚人历经苦难之后终究重逢团聚，并重新将波斯尼亚的兄弟们再度团结起来，我们至少成功了……"
Myth_of_National_Rejuvenation: "民族复兴神话"
Myth_of_National_Rejuvenation_desc: "团结所有塞尔维亚人、实现大塞尔维亚的统一并不是什么创新之举，而是对既定现实的“修整”，是自古以来的传统意识和历史权力，我们将再次实现在上次大战中被阻挠的皮埃蒙特之梦。"
Backward_country: "落后之国"
Backward_country_desc: "我们的国家缺乏学校，缺乏工厂，就连仅存的遗产也在多瑙战争化为炮灰。数年的重建并未让国家的情况好转，我们仍然在贫困与痛苦中挣扎。"