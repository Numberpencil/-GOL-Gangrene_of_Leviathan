Revolutionary_nationalism: "革命民族主义"
Revolutionary_nationalism_desc: "革命民族的概念与一战后的失败深深联系在一起，尽管德国获得了战争，但仍旧要面对萧条与内政的危机，荣格尔把这些苦难归结于议会制、民主与自由主义，在时代的浪潮里，他对于充满激情的工人有了极大的兴趣。\n——革命民族主义概念顺应而生，它超越了传统民族主义与保守主义的界限，不再诉诸“血与土”、“语言与文化”的落后概念，而是力图在“力”的革命中实现工人-士兵社会，国家不再是血缘与经济意义上的政治实体，而是统辖工人形态的神圣实体，民族只有在技术的超限中实现自我——民族意志的强力之下，形式主义与自由主义不过是破坏同一性的落后原则，在民族精英形式的贵族政治中，英雄现实主义般的存在体验才能造就新人类。\n最终，在技术与国家的全面总动员中，一切资源与人力都在动态之中成为国家有机体的燃料，没有人会存在软弱，取而代之的是效率与纪律，新的格式塔式社会将会取缔传统的民族国家与文化社群，技术与人将融为一体，星球将会由超人类国家。"
