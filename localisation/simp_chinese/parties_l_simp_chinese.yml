Social_democratism: "社会民主主义"
Social_democratism_desc: "社会民主主义起源于19世纪工业化浪潮中汹涌而起的工人运动。当机器的轰鸣取代了手工的节奏，当资本的积累以工人的血汗为燃料，当工厂成为规训与剥削的日常场所时，劳动者不再沉默。他们在罢工的火光里、在工会大厅的低语中、在街头游行的旗帜下，第一次集体地喊出了对正义的渴求。社会民主主义，就在这样的呼声中诞生。\n它继承了启蒙时期，社会主义思想对劳动者权益以及对社会公道的追崇，但是与革命形式的左翼派别不同，它在资本主义发展过程中见识到制度的自我完善与工人组织的变迁，它相信，真正的社会主义不是一夜之间砸碎旧世界，而是日复一日地重塑新秩序。\n尽管如今饱受批判与贬低，但它仍然作为巨人——耸立在政界中，为一代又一代的劳动者争取到了呼吸的空间、尊严的底线与未来的可能。"
