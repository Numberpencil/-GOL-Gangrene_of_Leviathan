Hybrid_regime: "无支配体制"
Hybrid_regime_desc: "无支配体制，通常也被称为混合政体，是一种同时结合了民主和专制元素的政府形式。虽然无支配体制通常允许某种形式的（尽管只占一半）的民主，如选举存在，但无支配体制的政权往往拥有一些被认为是非民主甚至专制的法律。虽然不一定像纯粹的专制政权那样充斥着腐败和压迫，但它们仍然容易做出与专制政权相同的极端行为。"
