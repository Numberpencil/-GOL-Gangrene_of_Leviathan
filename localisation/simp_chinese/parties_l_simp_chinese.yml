Spartakismus: "斯巴达克斯主义"
Spartakismus_desc: "斯巴达克主义分娩于社会民主党内部的矛盾对峙时刻，卢森堡与卡尔·李卜尔内西共同创立了斯巴达克同盟，这一意识形态被用于指称从社会民主主义保守派分裂而出的激进异己分子。\n斯巴达克主义不同于传统的工农联盟路线，而是力求士兵、工人、学生的共同参与，它不同于布尔什维克的先锋派路线，而是呼吁全国性的总罢工运动，要求解除常备军武装，让民兵成为保卫革命主力，要求废除等级制，呼吁实现真正的平等，要求取消议会与警察机构，成立委员会掌管一切。\n“起来，无产阶级！投入战斗！应该占领一个世界，并且反对一个世界。在世界历史上这场为了实现人类最高目的的最后的阶级斗争中，这句话对敌人是适用的：报仇雪恨！”"
