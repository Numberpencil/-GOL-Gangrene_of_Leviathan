Constitutionalist: "宪政主义"
Constitutionalist_desc: "宪政主义是一种坚持国家根基不可动摇的意形态。宪政派鄙视社会制度及经济制度方面的改革，他们认为改革破坏了国家的根基。有些人会戏称宪政主义的支持者冥顽不化，但在宪政主义管理下，企业能够明确自身的地位，能够明晰权力，经济也更依赖于政府抉择。"
