Classical_fascism: "古典法西斯主义"
Classical_fascism_desc: "古典法西斯主义是由乔瓦尼·真蒂莱和贝尼托·墨索里尼在意大利发展起来的、原初的法西斯意识形态。古典法西斯主义基于民族主义、法团主义以及扩张领土和帝国主义的欲望。古典法西斯主义者主张法团经济体制：由雇主和雇员组成的协会联合起来，作为国家的经济生产者的共同代表，并与国家一起制定经济政策。这种经济体系旨在通过阶级间的合作来解决阶级冲突，而社会主义、施特拉瑟主义或民族布尔什维主义则鼓励阶级之间的冲突。古典法西斯主义也谴责自由主义，尤其是古典自由主义，法西斯领导人将其谴责为\"个人主义的崩溃\"。"
