Liberalism: "自由主义"
Liberalism_desc: "自由主义之含义与宗旨便在于其名：自由，对于自由的向往和渴盼嵌入进追随者的灵魂与本性中。它号称人人皆有自由意志，并通过暴力与革命的形式让公民从君主的私有财富中解放出来，“天赋人权”不是一种单纯的口号，而是古希腊“自治”与“公民美德”的现代性重演与颠覆。自由就这样伴随着时代与变革成为了人类文明史上不可撼动的理念。\n自由主义——标榜为推倒愚昧与黑暗的正义之军，就这样成为了保障经济自由、个人权利与私有财富、资本主义市场的政治-制度，并因美国在独立战争的辉煌战役而取得对全球的世界性胜利，从而开启了进步、平等的时代——自由主义便这样内嵌于人类历史的重要篇章中。"
Christian_democratic: "基督民主主义"
Christian_democratic_desc: "基督教民主主义源于19世纪欧洲天主教对工业化洪流与自由放任资本主义双重撕裂的回应。它拒绝让市场成为唯一的神，也拒绝让阶级仇恨成为唯一的正义。它相信，真正的社会秩序只能在基督徒的良知与教会训导的指引下重建。\n它将《圣经》中“爱邻如己”与“人的尊严”这些古老箴言，转化为可触摸的政治行动准则：它完成了对世俗政治的神学僭越——政治不再是赤裸的权力游戏，而应成为对人性尊严的守护与救赎。它拒绝极端个人主义，也拒绝全能国家主义；它主张辅助性原则——让最小的共同体（家庭、教会、合作社、地方自治体）承担最大可能的事务，只有在它们无力之时，国家才以谦卑的姿态介入。\n“行公义，好怜悯，存谦卑的心，与你的神同行”"
Christian_democratic_Z: "基督民主主义"
Christian_democratic_Z_desc: "基督教民主主义源于19世纪欧洲天主教对工业化洪流与自由放任资本主义双重撕裂的回应。它拒绝让市场成为唯一的神，也拒绝让阶级仇恨成为唯一的正义。它相信，真正的社会秩序只能在基督徒的良知与教会训导的指引下重建。\n它将《圣经》中“爱邻如己”与“人的尊严”这些古老箴言，转化为可触摸的政治行动准则：它完成了对世俗政治的神学僭越——政治不再是赤裸的权力游戏，而应成为对人性尊严的守护与救赎。它拒绝极端个人主义，也拒绝全能国家主义；它主张辅助性原则——让最小的共同体（家庭、教会、合作社、地方自治体）承担最大可能的事务，只有在它们无力之时，国家才以谦卑的姿态介入。\n“行公义，好怜悯，存谦卑的心，与你的神同行”"
