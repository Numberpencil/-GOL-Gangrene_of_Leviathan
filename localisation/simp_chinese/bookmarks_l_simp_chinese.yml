Gangrene_of_Leviathan_FRA_DESC: "世界大战的惨败让无数法国人为之懊恼，而在战败之后紧接而来的就是严峻的社会问题并逐渐演变成了全国范围内的革命。尽管最终被军方付出极大代价镇压但也进一步割裂了全法国。\n在军方镇压革命之后便迅速肃清了法国政局建立了法兰西临时国防政府，其统治一直延续到今日。在军政府时期，法国的国力有所恢复，但随着时间的推进，越来越多法国人希望结束军政府统治，重新向民主过渡。\n军政府如今正承受着巨大的压力，而大统领德斯佩雷身体情况的逐渐恶化似乎正暗示着民主化过渡已经不可避免。而随着拉加代尔的法兰西工团行动党在法国的迅速崛起以及他与军方的暖昧关系，让无数人认为他就是军政府的统治可能结束后的全国大选的有力竟争。"